rules:
  - id: hardcoded-secret
    patterns:
      - pattern: const $KEY = "..."
      - metavariable-regex:
          metavariable: $KEY
          regex: (?i)(secret|password|passwd|api_key|apikey|token|jwt_secret)
    message: "Hardcoded secret detected. Use environment variables instead."
    languages: [javascript]
    severity: WARNING
    metadata:
      cwe: CWE-798
      owasp: A02:2021
